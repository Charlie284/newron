<!doctype html>
<html lang="en-US">
    <head>
        <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
        <base href="$FLUTTER_BASE_HREF" />

        <meta charset="UTF-8" />
        <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <meta
            name="description"
            content="Research-augmented news briefings, source context, and bias analysis."
        />
        <meta name="theme-color" content="#0C0703" />
        <link rel="canonical" href="https://app.newron.clh.lol/" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Newron" />
        <meta
            property="og:description"
            content="Research-augmented news briefings with visible source context and optional AI analysis."
        />
        <meta property="og:url" content="https://app.newron.clh.lol/" />
        <meta
            property="og:image"
            content="https://app.newron.clh.lol/icons/Icon-512.png"
        />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Newron" />
        <meta
            name="twitter:description"
            content="Research-augmented news briefings with visible source context and optional AI analysis."
        />
        <meta
            name="twitter:image"
            content="https://app.newron.clh.lol/icons/Icon-512.png"
        />

        <!-- iOS meta tags & icons -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-title" content="Newron" />
        <link rel="apple-touch-icon" href="icons/Icon-192.png" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="favicon.png" />

        <title>Newron</title>
        <link rel="manifest" href="manifest.json" />
    </head>
    <body style="margin: 0; background: #0c0703">
        <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
        <script src="flutter_bootstrap.js" async></script>
    </body>
</html>
