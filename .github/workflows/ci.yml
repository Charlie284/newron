name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve packages
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test Flutter code
        run: flutter test
      - name: Test gateway
        run: node --test test/web_gateway_test.mjs
      - name: Build web release
        run: flutter build web --release --no-wasm-dry-run
      - name: Prune unused web renderer artifacts
        run: node tool/prune_web_release.mjs
      - name: Build unsigned Android release
        run: flutter build apk --release

  marketing-site:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs/site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/site/package-lock.json
      - name: Install packages
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
